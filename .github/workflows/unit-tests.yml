name: Unit Tests
on:
  push: # run on push to any branches
  pull_request:
    branches: [develop, main]
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v.8.2.0
        with:
          enable-cache: true
      - name: Install Python version pinned for the project
        run: uv python install
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run tests with coverage
        run: uv run pytest --cov=iconoscope --cov-report=term-missing --cov-report=xml
      - name: Upload coverage report
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5.5.5
        with:
          files: coverage.xml
          fail_ci_if_error: false
